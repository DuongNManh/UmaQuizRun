name: Build and Push Docker Image

on:
    push:
        branches:
            - main

jobs:
    build:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Read VERSION and bump patch (main branch)
              id: version
              if: github.ref == 'refs/heads/main'
              run: |
                  # Đọc version hiện tại
                  current=$(cat VERSION)
                  echo "Current version: $current"

                  # Kiểm tra định dạng semver
                  if [[ ! $current =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid VERSION format" >&2
                    exit 1
                  fi

                  IFS='.' read -r major minor patch <<< "$current"
                  patch=$((patch + 1))
                  next="$major.$minor.$patch"

                  echo "New version: $next"
                  echo "$next" > VERSION

                  # commit/push VERSION mới và tag git
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add VERSION
                  git commit -m "ci: bump version to $next"
                  git tag "v$next"
                  git push origin HEAD:main
                  git push origin "v$next"

                  echo "tag=v$next" >> $GITHUB_OUTPUT

            - name: Determine image tags
              id: imagetag
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    tag="v$(cat VERSION)"
                  else
                    tag="${{ github.sha }}"
                  fi
                  echo "image_tag=$tag" >> $GITHUB_OUTPUT

            - name: Determine image owner lowercase
              id: imageowner
              run: |
                  owner="${GITHUB_REPOSITORY_OWNER,,}"
                  echo "owner=$owner" >> $GITHUB_OUTPUT

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push to GHCR
              uses: docker/build-push-action@v5
              with:
                  push: true
                  tags: |
                      ghcr.io/${{ steps.imageowner.outputs.owner }}/umaquizrun:${{ steps.imagetag.outputs.image_tag }}
                      ghcr.io/${{ steps.imageowner.outputs.owner }}/umaquizrun:latest
                  file: Dockerfile
                  context: .
