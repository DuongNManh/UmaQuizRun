name: PR Build / Test

on:
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build image (no push)
              uses: docker/build-push-action@v5
              with:
                  push: false
                  tags: |
                      umaquizrun-pr:${{ github.sha }}
                  file: Dockerfile
                  context: .

            - name: (Optional) Run tests if any
              run: |
                  echo "No dedicated test suite configured. Add commands here, e.g. npm test hoặc yarn test."
